<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Base Reset & Layout */
        html, body {
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent double scrollbars */
        }
        
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .serif { font-family: 'Merriweather', serif; }
        code, pre { font-family: 'Fira Code', monospace; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Join Visualizer CSS Shapes */
        .venn-container {
            position: relative;
            width: 200px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .venn-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            position: absolute;
            mix-blend-mode: multiply; /* Creates the color mix effect */
            transition: all 0.3s ease;
            opacity: 0.3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .venn-left { background-color: #3b82f6; left: 0; }
        .venn-right { background-color: #ef4444; right: 0; }
        
        /* Chart Container */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            height: 300px;
            max-height: 400px;
        }
        
        .code-block {
            background-color: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            border-left: 4px solid #3b82f6;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .active-nav {
            background-color: #e0f2fe;
            color: #0369a1;
            border-right: 3px solid #0284c7;
        }
    </style>
    <!-- Chosen Palette: Academic Slate (Slate-50 bg, Slate-900 text, Blue-600 primary) -->
    <!-- Application Structure Plan: Sidebar nav + Dynamic Content Area. High robustness fixes applied. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col md:flex-row h-full">

    <!-- Mobile Header / Toggle -->
    <div class="md:hidden bg-white border-b border-slate-200 p-4 flex justify-between items-center z-50">
        <span class="font-bold text-slate-800 serif">MySQL Masterclass</span>
        <button id="mobile-menu-btn" class="text-slate-600 focus:outline-none p-2 rounded hover:bg-slate-100">
            <span class="text-xl">☰</span>
        </button>
    </div>

    <!-- Sidebar Navigation -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 h-full flex-shrink-0 z-40 absolute md:static top-14 md:top-0 bottom-0 shadow-xl md:shadow-none transition-all duration-300 transform md:transform-none -translate-x-full md:translate-x-0" id="sidebar">
        <div class="p-6 border-b border-slate-100 bg-slate-50 hidden md:block">
            <h1 class="text-xl font-bold text-slate-900 tracking-tight serif">MySQL<br><span class="text-blue-600 text-base font-normal">Masterclass</span></h1>
            <p class="text-xs text-slate-500 mt-2">v8.0 Refresher Course</p>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-1" id="nav-container">
            <!-- Nav items injected by JS -->
        </nav>
        <div class="p-4 border-t border-slate-100">
            <div class="bg-blue-50 rounded-lg p-3">
                <p class="text-xs font-semibold text-blue-800">Learning Status</p>
                <div class="w-full bg-blue-200 rounded-full h-1.5 mt-2">
                    <div class="bg-blue-600 h-1.5 rounded-full" style="width: 0%" id="progress-bar"></div>
                </div>
                <p class="text-[10px] text-blue-600 mt-1 text-right" id="progress-text">0% Complete</p>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50 w-full">
        
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center shadow-sm z-10 flex-shrink-0 h-auto sm:h-20">
            <div class="mb-2 sm:mb-0">
                <h2 class="text-xl sm:text-2xl font-bold text-slate-900 serif" id="header-title">Welcome</h2>
                <p class="text-xs sm:text-sm text-slate-500" id="header-subtitle">Select a module to begin.</p>
            </div>
            <div>
                <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-mono border border-slate-200">Engine: InnoDB</span>
            </div>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 sm:p-8 scroll-smooth w-full" id="main-scroll">
            <div class="max-w-4xl mx-auto pb-20 w-full" id="content-container">
                <!-- Dynamic Content Injected Here -->
            </div>
        </div>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- Course Data ---
            const courseData = {
                intro: {
                    title: "Course Overview",
                    subtitle: "University-Level MySQL Refresher",
                    content: `

                            <p class="text-lg leading-relaxed mb-6">

                },
                basics: {
                    title: "1. Foundations: Syntax & Types",
                    subtitle: "Strict typing, operators, and the SQL mode.",
                    content: `
                        <div class="space-y-8">
                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">The MySQL Dialect & Strict Mode</h3>
                                <p class="text-slate-700 mb-4">
                                    While compliant with ANSI SQL standards, MySQL introduces specific extensions. A critical starting point for any rigorous environment is the <code>sql_mode</code>. Modern MySQL (8.0+) defaults to strict mode, preventing invalid data insertion (e.g., zero dates or truncation).
                                </p>
                                <div class="code-block">
                                    <div class="text-xs text-slate-400 mb-1">Checking Global SQL Modes</div>
                                    <pre>SELECT @@GLOBAL.sql_mode;
-- Output: ONLY_FULL_GROUP_BY, STRICT_TRANS_TABLES, NO_ZERO_DATE...</pre>
                                </div>
                            </section>

                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Data Types & Precision</h3>
                                <p class="text-slate-700 mb-4">
                                    Choosing the correct data type is the first step in optimization.
                                </p>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-sm text-left text-slate-600 border border-slate-200 rounded-lg min-w-[500px]">
                                        <thead class="bg-slate-100 text-slate-800 font-bold">
                                            <tr><th class="px-4 py-2">Category</th><th class="px-4 py-2">Type</th><th class="px-4 py-2">Best Practice Note</th></tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-200">
                                            <tr><td class="px-4 py-2">Numeric</td><td class="px-4 py-2 font-mono">DECIMAL(P,S)</td><td class="px-4 py-2">Mandatory for financial data. Exact fixed-point arithmetic.</td></tr>
                                            <tr><td class="px-4 py-2">Numeric</td><td class="px-4 py-2 font-mono">BIGINT</td><td class="px-4 py-2">Use for primary keys in high-growth tables.</td></tr>
                                            <tr><td class="px-4 py-2">String</td><td class="px-4 py-2 font-mono">VARCHAR(N)</td><td class="px-4 py-2">Variable length. N is characters, not bytes.</td></tr>
                                            <tr><td class="px-4 py-2">Date</td><td class="px-4 py-2 font-mono">TIMESTAMP</td><td class="px-4 py-2">Time-zone aware (UTC stored), unlike DATETIME.</td></tr>
                                            <tr><td class="px-4 py-2">JSON</td><td class="px-4 py-2 font-mono">JSON</td><td class="px-4 py-2">Native support (5.7+). Enables document storage.</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        </div>
                    `
                },
                joins: {
                    title: "2. Advanced Querying: Joins",
                    subtitle: "Set theory applied to relational data.",
                    hasLab: true,
                    labType: 'join',
                    content: `
                        <div class="space-y-8">
                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Set Theory & Joins</h3>
                                <p class="text-slate-700 mb-4">
                                    Joins are the mechanism by which we reconstruct normalized data. Understanding the underlying set theory is crucial for accuracy.
                                </p>
                                <div class="bg-slate-100 p-6 rounded-lg border border-slate-200 mb-6 flex flex-col items-center">
                                    <h4 class="font-bold text-slate-700 mb-6 text-center w-full border-b border-slate-200 pb-2">Interactive Join Visualizer</h4>
                                    
                                    <div class="flex flex-col md:flex-row items-center justify-center gap-10 w-full">
                                        <!-- Visual -->
                                        <div class="venn-container">
                                            <div id="circle-left" class="venn-circle venn-left"></div>
                                            <div id="circle-right" class="venn-circle venn-right"></div>
                                            <div class="absolute text-xs font-bold text-blue-900 left-0 top-0 bg-white/80 px-1 rounded">Table A</div>
                                            <div class="absolute text-xs font-bold text-red-900 right-0 top-0 bg-white/80 px-1 rounded">Table B</div>
                                        </div>
                                        
                                        <!-- Controls -->
                                        <div class="flex flex-col gap-2 w-full md:w-auto">
                                            <button onclick="window.updateJoin('inner')" class="px-4 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 text-sm font-medium transition shadow-sm w-full md:w-32">INNER JOIN</button>
                                            <button onclick="window.updateJoin('left')" class="px-4 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 text-sm font-medium transition shadow-sm w-full md:w-32">LEFT JOIN</button>
                                            <button onclick="window.updateJoin('right')" class="px-4 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 text-sm font-medium transition shadow-sm w-full md:w-32">RIGHT JOIN</button>
                                        </div>
                                    </div>

                                    <!-- Explanation -->
                                    <div class="w-full mt-6 text-sm bg-white p-4 rounded border border-slate-200 min-h-[80px] flex items-center justify-center">
                                        <p id="join-desc" class="text-slate-600 text-center">Select a join type above to see the set relationship.</p>
                                    </div>
                                </div>
                            </section>

                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Subqueries vs. Joins</h3>
                                <p class="text-slate-700 mb-4">
                                    In modern MySQL (5.6+), the optimizer handles subqueries significantly better via materialization. However, <code>EXISTS</code> is often more performant than <code>IN</code> for large datasets because it allows "early exit" once a match is found.
                                </p>
                                <div class="code-block">
<pre>-- Correlated Subquery (Often slower)
SELECT * FROM employees e 
WHERE salary > (SELECT AVG(salary) FROM employees WHERE dept_id = e.dept_id);

-- Window Function Equivalent (Faster & Cleaner in 8.0+)
SELECT * FROM (
  SELECT *, AVG(salary) OVER(PARTITION BY dept_id) as avg_sal
  FROM employees
) t WHERE salary > avg_sal;</pre>
                                </div>
                            </section>
                        </div>
                    `
                },
                indexes: {
                    title: "3. Indexes & Performance",
                    subtitle: "B-Trees, Cardinality, and Query Optimization.",
                    hasLab: true,
                    labType: 'chart',
                    content: `
                        <div class="space-y-8">
                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">The B-Tree Index</h3>
                                <p class="text-slate-700 mb-4">
                                    In InnoDB, the default index structure is the B-Tree. It keeps data sorted and allows for searches, sequential access, insertions, and deletions in logarithmic time (O(log n)).
                                </p>
                                <ul class="list-disc pl-5 space-y-2 text-slate-700 mb-4">
                                    <li><strong>Clustered Index:</strong> The Primary Key. The leaf nodes contain the actual row data. Every table in InnoDB has exactly one.</li>
                                    <li><strong>Secondary Index:</strong> Leaf nodes contain the Primary Key value. A lookup here often requires a second lookup (Join) to the Clustered Index to get full row data.</li>
                                </ul>
                            </section>

                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Performance Impact</h3>
                                <p class="text-slate-700 mb-4">
                                    Indexes drastically reduce the number of rows the engine must scan (Cost). However, they add overhead to writes (INSERT/UPDATE) as the tree must be rebalanced.
                                </p>
                                <div class="bg-white p-4 rounded-lg shadow border border-slate-200 mb-6">
                                    <h4 class="text-sm font-bold text-slate-500 uppercase tracking-wide mb-4 text-center">Query Cost: Rows Scanned (Log Scale)</h4>
                                    <div class="chart-container">
                                        <canvas id="perfChart"></canvas>
                                    </div>
                                    <p class="text-xs text-center text-slate-400 mt-2">Comparison of looking up 1 record in 1M rows.</p>
                                </div>
                            </section>

                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Common Pitfalls</h3>
                                <ul class="space-y-3">
                                    <li class="flex items-start">
                                        <span class="text-red-500 mr-2 font-bold">⚠</span>
                                        <span class="text-slate-700 text-sm"><strong>Functions on Columns:</strong> <code>WHERE YEAR(date_col) = 2023</code> invalidates the index. Use <code>WHERE date_col BETWEEN '2023-01-01' AND '2023-12-31'</code>.</span>
                                    </li>
                                    <li class="flex items-start">
                                        <span class="text-red-500 mr-2 font-bold">⚠</span>
                                        <span class="text-slate-700 text-sm"><strong>Wildcard at Start:</strong> <code>LIKE '%term'</code> cannot use a B-Tree index (left-prefix rule). <code>LIKE 'term%'</code> can.</span>
                                    </li>
                                </ul>
                            </section>
                        </div>
                    `
                },
                acid: {
                    title: "4. Data Integrity: ACID & Transactions",
                    subtitle: "Ensuring reliability in concurrent systems.",
                    content: `
                        <div class="space-y-8">
                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">The ACID Guarantee</h3>
                                <p class="text-slate-700 mb-6">
                                    Relational databases guarantee validity through ACID properties. Click the cards below to explore each property.
                                </p>
                                
                                <div class="grid grid-cols-2 gap-4 mb-8">
                                    <div onclick="window.showAcid('a')" class="cursor-pointer p-4 bg-white border border-slate-200 hover:border-blue-400 rounded transition shadow-sm group">
                                        <span class="text-2xl font-black text-slate-300 group-hover:text-blue-500">A</span>
                                        <h4 class="font-bold text-slate-700">Atomicity</h4>
                                    </div>
                                    <div onclick="window.showAcid('c')" class="cursor-pointer p-4 bg-white border border-slate-200 hover:border-blue-400 rounded transition shadow-sm group">
                                        <span class="text-2xl font-black text-slate-300 group-hover:text-blue-500">C</span>
                                        <h4 class="font-bold text-slate-700">Consistency</h4>
                                    </div>
                                    <div onclick="window.showAcid('i')" class="cursor-pointer p-4 bg-white border border-slate-200 hover:border-blue-400 rounded transition shadow-sm group">
                                        <span class="text-2xl font-black text-slate-300 group-hover:text-blue-500">I</span>
                                        <h4 class="font-bold text-slate-700">Isolation</h4>
                                    </div>
                                    <div onclick="window.showAcid('d')" class="cursor-pointer p-4 bg-white border border-slate-200 hover:border-blue-400 rounded transition shadow-sm group">
                                        <span class="text-2xl font-black text-slate-300 group-hover:text-blue-500">D</span>
                                        <h4 class="font-bold text-slate-700">Durability</h4>
                                    </div>
                                </div>

                                <div id="acid-detail" class="bg-blue-50 p-6 rounded border-l-4 border-blue-500 text-slate-700 min-h-[120px]">
                                    <p class="font-bold">Select a property above to see details.</p>
                                </div>
                            </section>

                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Isolation Levels</h3>
                                <p class="text-slate-700 mb-4">
                                    Isolation dictates how transactions see each other's changes. Higher isolation means better consistency but lower concurrency (more locking).
                                </p>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-sm text-left border border-slate-200 min-w-[500px]">
                                        <thead class="bg-slate-100 font-bold text-slate-700">
                                            <tr><th class="p-2">Level</th><th class="p-2">Dirty Read</th><th class="p-2">Non-Repeatable</th><th class="p-2">Phantom Read</th></tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-100">
                                            <tr><td class="p-2 font-mono">READ UNCOMMITTED</td><td class="p-2 text-red-500">Possible</td><td class="p-2 text-red-500">Possible</td><td class="p-2 text-red-500">Possible</td></tr>
                                            <tr><td class="p-2 font-mono">READ COMMITTED</td><td class="p-2 text-green-600">Prevented</td><td class="p-2 text-red-500">Possible</td><td class="p-2 text-red-500">Possible</td></tr>
                                            <tr><td class="p-2 font-mono bg-blue-50 font-bold">REPEATABLE READ</td><td class="p-2 text-green-600">Prevented</td><td class="p-2 text-green-600">Prevented</td><td class="p-2 text-green-600">Prevented*</td></tr>
                                            <tr><td class="p-2 font-mono">SERIALIZABLE</td><td class="p-2 text-green-600">Prevented</td><td class="p-2 text-green-600">Prevented</td><td class="p-2 text-green-600">Prevented</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                                <p class="text-xs text-slate-500 mt-2">*Prevented in InnoDB via Gap Locks.</p>
                            </section>
                        </div>
                    `
                },
                security: {
                    title: "5. Security & Administration",
                    subtitle: "Users, Privileges, and Backups.",
                    content: `
                        <div class="space-y-8">
                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Principle of Least Privilege</h3>
                                <p class="text-slate-700 mb-4">
                                    Never use the <code>root</code> account for application connections. Create specific users with restricted privileges relative to their needs.
                                </p>
                                <div class="code-block">
<pre>-- Create Application User
CREATE USER 'app_svc'@'10.0.0.%' IDENTIFIED BY 'strong_pass';

-- Grant Specific Rights
GRANT SELECT, INSERT, UPDATE ON my_db.* TO 'app_svc'@'10.0.0.%';
-- Note: Avoid granting DELETE or ALTER unless necessary.</pre>
                                </div>
                            </section>
                            
                            <section>
                                <h3 class="text-xl font-bold text-slate-800 mb-3 serif">Backup Strategy</h3>
                                <p class="text-slate-700 mb-4">
                                    <strong>Logical Backups (mysqldump):</strong> Text files containing SQL statements. Good for portability, slow for restoration. <br>
                                    <strong>Physical Backups (Percona XtraBackup):</strong> Copies actual data files. Fast restoration, essential for large datasets.
                                </p>
                            </section>
                        </div>
                    `
                }
            };

            const acidDetails = {
                a: "<strong>Atomicity:</strong> All or nothing. If one part of the transaction fails, the entire transaction fails and the database state is left unchanged. <br><em class='text-sm mt-2 block text-blue-600'>Example: Transferring money. If debit succeeds but credit fails, the debit is rolled back.</em>",
                c: "<strong>Consistency:</strong> The database must move from one valid state to another. All constraints (Foreign Keys, Data Types) must be satisfied. Illegal transactions are rejected.",
                i: "<strong>Isolation:</strong> Transactions occurring concurrently must not interfere with each other. This is handled by locking mechanisms and MVCC (Multi-Version Concurrency Control).",
                d: "<strong>Durability:</strong> Once a transaction is committed, it remains committed even in the event of a power loss or crash (thanks to the Write-Ahead Log / Redo Log)."
            };

            // --- Core Logic ---
            const navContainer = document.getElementById('nav-container');
            const contentContainer = document.getElementById('content-container');
            const headerTitle = document.getElementById('header-title');
            const headerSubtitle = document.getElementById('header-subtitle');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const sidebar = document.getElementById('sidebar');
            
            let currentModule = 'intro';
            let chartInstance = null;

            // Initialize
            function init() {
                renderNav();
                // Default load
                window.loadModule('intro');
            }

            // Render Navigation
            function renderNav() {
                navContainer.innerHTML = '';
                Object.keys(courseData).forEach((key) => {
                    const item = courseData[key];
                    const btn = document.createElement('button');
                    const isActive = key === currentModule;
                    btn.className = `w-full text-left px-3 py-2 rounded text-sm font-medium transition-colors mb-1 ${isActive ? 'active-nav' : 'text-slate-600 hover:bg-slate-100'}`;
                    btn.innerText = item.title;
                    btn.onclick = () => window.loadModule(key);
                    navContainer.appendChild(btn);
                });
            }

            // Global Functions (Attached to Window for HTML access)
            
            window.loadModule = function(key) {
                currentModule = key;
                const data = courseData[key];
                
                // Update Header
                headerTitle.innerText = data.title;
                headerSubtitle.innerText = data.subtitle;
                
                // Render Content
                contentContainer.innerHTML = data.content;
                
                // Update Nav UI
                renderNav();
                updateProgress();

                // Close mobile menu if open
                if (!sidebar.classList.contains('hidden') && window.innerWidth < 768) {
                    toggleMobileMenu(); // Close it
                }

                // Handle Labs
                if (data.hasLab) {
                    setTimeout(() => {
                        if (data.labType === 'join') window.updateJoin('inner');
                        if (data.labType === 'chart') initChart();
                    }, 50); // Small delay to ensure DOM injection
                }
                
                // Scroll Top
                document.getElementById('main-scroll').scrollTop = 0;
            };

            function updateProgress() {
                const keys = Object.keys(courseData);
                const index = keys.indexOf(currentModule);
                const percent = Math.round(((index + 1) / keys.length) * 100);
                progressBar.style.width = `${percent}%`;
                progressText.innerText = `${percent}% Complete`;
            }

            window.updateJoin = function(type) {
                const left = document.getElementById('circle-left');
                const right = document.getElementById('circle-right');
                const desc = document.getElementById('join-desc');

                if(!left || !right) return;

                // Reset
                left.style.opacity = '0.3';
                right.style.opacity = '0.3';

                let explanation = "";

                if (type === 'inner') {
                    left.style.opacity = '0.6';
                    right.style.opacity = '0.6';
                    explanation = "<strong>INNER JOIN:</strong> Returns records that have matching values in both tables. Visually represented by the intersection.";
                } else if (type === 'left') {
                    left.style.opacity = '1';
                    right.style.opacity = '0.3';
                    explanation = "<strong>LEFT JOIN:</strong> Returns all records from the left table (Table A), and the matched records from the right table (Table B). Unmatched right results are NULL.";
                } else if (type === 'right') {
                    left.style.opacity = '0.3';
                    right.style.opacity = '1';
                    explanation = "<strong>RIGHT JOIN:</strong> Returns all records from the right table (Table B), and the matched records from the left table (Table A). Unmatched left results are NULL.";
                }

                desc.innerHTML = explanation;
            };

            window.showAcid = function(char) {
                const detailBox = document.getElementById('acid-detail');
                if (detailBox && acidDetails[char]) {
                    detailBox.innerHTML = acidDetails[char];
                }
            };

            function initChart() {
                const ctx = document.getElementById('perfChart');
                if (!ctx) return;
                
                // Destroy previous instance if exists to prevent reuse errors
                if (chartInstance) {
                    chartInstance.destroy();
                }

                chartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Full Table Scan', 'Index Scan (B-Tree)'],
                        datasets: [{
                            label: 'Rows Scanned (1M Records)',
                            data: [1000000, 1],
                            backgroundColor: ['#ef4444', '#22c55e'],
                            barThickness: 50,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                type: 'logarithmic',
                                title: { display: true, text: 'Rows Processed (Log Scale)' },
                                grid: { color: '#f1f5f9' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return context.parsed.y.toLocaleString() + ' rows';
                                    }
                                }
                            }
                        }
                    }
                });
            }

            // Mobile Menu Logic
            const mobileBtn = document.getElementById('mobile-menu-btn');
            
            function toggleMobileMenu() {
                // Tailwind toggle logic for slide-over
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('hidden');
                    // Slight delay to allow display:block to apply before transition
                    setTimeout(() => {
                        sidebar.classList.remove('-translate-x-full');
                    }, 10);
                } else {
                    sidebar.classList.add('-translate-x-full');
                    setTimeout(() => {
                        sidebar.classList.add('hidden');
                    }, 300); // Match transition duration
                }
            }

            if (mobileBtn) {
                mobileBtn.onclick = toggleMobileMenu;
            }

            // Start App
            init();
        });
    </script>
</body>
</html>
